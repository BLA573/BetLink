<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>BetLink - Affordable Short-Stay Accommodation</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const analyticsEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const analyticsWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";

      if (!analyticsEndpoint.includes("%VITE_") && !analyticsWebsiteId.includes("%VITE_")) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${analyticsEndpoint}/umami`;
        script.setAttribute("data-website-id", analyticsWebsiteId);
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
